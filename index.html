<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <title>START - XD HANGMAN</title>
</head>
<body>
    <div class="title">
        <h1>XD HANGMAN</h1>
        <h2>POSE EDITION</h2>
    </div>

    <div class="mainStart">
        <div class="instructions">
            <h2>HOW IT WORKS?</h2>
            <div class="box">
                <p>step 1: You see a hidden word.</p>
            </div>
            <div class="box">
                <p>step 2: Pose the letter you want to guess with your body.</p>
            </div>
            <div class="box">
                <p>step 3: Teachable Machine recognises your pose and guesses the letter.</p>
            </div>
            <div class="box">
                <p>step 4: Guess all letters before you run out of your 5 lives!</p>
            </div>
        </div>
        <div class="hangman">
            <svg class="hangman-svg" viewBox="0 0 300 300" width="300" height="300" fill="none" xmlns="http://www.w3.org/2000/svg" id="hangman-svg">
                <!-- Basis -->
                <line x1="30" y1="270" x2="270" y2="270" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>
                <!-- Verticale paal -->
                <line x1="90" y1="270" x2="90" y2="30" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>
                <!-- Horizontale balk -->
                <line x1="90" y1="30" x2="200" y2="30" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>
                <!-- Touw -->
                <line x1="200" y1="30" x2="200" y2="57" stroke="#7B5EA7" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 4"/>

                <!-- Hoofd: r=24 -->
                <circle id="part-head" cx="200" cy="81" r="24" stroke="#7B5EA7" stroke-width="5"/>

                <!-- Lichaam: start onder hoofd (81+24=105), lengte ~70px -->
                <line id="part-body" x1="200" y1="105" x2="200" y2="175" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round" />

                <!-- Armen: vanaf 1/3 van lichaam (~125) -->
                <line id="part-arm1" x1="200" y1="125" x2="165" y2="155" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>
                <line id="part-arm2" x1="200" y1="125" x2="235" y2="155" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>

                <!-- Benen: vanaf onderkant lichaam (175) -->
                <line id="part-leg1" x1="200" y1="175" x2="170" y2="225" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>
                <line id="part-leg2" x1="200" y1="175" x2="230" y2="225" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round"/>
            </svg> 
        </div>
    </div>
   
    <div class="btn">
        <a href="game.html">START</a>
    </div>

</body>
</html>
